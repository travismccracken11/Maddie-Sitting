<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maddie & House Stuff</title>

  <style>
    :root {
      --bg: #f6f3ee;
      --card: #ffffff;
      --text: #171717;
      --muted: #646464;
      --border: #e3ded6;
      --accent: #111111;
      --warning-bg: #fff7d6;
      --warning-border: #eadb92;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }

    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 18px;
    }

    header {
      padding: 18px 0 8px;
    }

    h1 {
      font-size: 32px;
      line-height: 1.1;
      margin: 0 0 8px;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }

    .notice {
      background: var(--warning-bg);
      border: 1px solid var(--warning-border);
      border-radius: 14px;
      padding: 12px 14px;
      margin: 18px 0;
      font-size: 15px;
    }

    .nav {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 0 14px;
      margin: 10px 0 4px;
      -webkit-overflow-scrolling: touch;
    }

    .nav a {
      white-space: nowrap;
      display: inline-block;
      text-decoration: none;
      color: var(--text);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      margin: 16px 0;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
    }

    .card h2 {
      font-size: 24px;
      line-height: 1.15;
      margin: 0 0 10px;
      letter-spacing: -0.02em;
    }

    .file-name {
      color: var(--muted);
      font-size: 13px;
      margin: -2px 0 12px;
      word-break: break-word;
    }

    p {
      margin: 0 0 12px;
      font-size: 16px;
    }

    ul {
      margin: 0 0 12px;
      padding-left: 20px;
    }

    li {
      margin: 6px 0;
      font-size: 16px;
    }

    .video-shell {
      margin-top: 14px;
    }

    .video-label {
      font-size: 14px;
      color: var(--muted);
      margin: 0 0 7px;
    }

    .video {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #111;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #222;
    }

    .video iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #111;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .button {
      display: inline-block;
      text-decoration: none;
      background: var(--accent);
      color: #fff;
      border-radius: 999px;
      padding: 10px 13px;
      font-size: 14px;
      font-weight: 600;
    }

    .button.secondary {
      background: #ece8df;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .empty-video {
      background: #f1eee8;
      border: 1px dashed #cfc7b8;
      border-radius: 14px;
      padding: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    footer {
      color: var(--muted);
      font-size: 13px;
      padding: 22px 0 40px;
      text-align: center;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111111;
        --card: #1b1b1b;
        --text: #f4f4f4;
        --muted: #b6b6b6;
        --border: #333333;
        --accent: #ffffff;
        --warning-bg: #332b0e;
        --warning-border: #67571c;
      }

      .button {
        color: #111;
      }

      .button.secondary {
        background: #2a2a2a;
        color: var(--text);
      }

      .empty-video {
        background: #202020;
        border-color: #444;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <header>
      <h1>Maddie & House Stuff</h1>
      <p class="subtitle">Quick videos and notes for taking care of Maddie and basic house stuff.</p>
    </header>

    <div class="notice">
      <strong>Note:</strong> If a video does not play inside the page, tap <strong>Open video directly</strong> under that video.
    </div>

    <nav class="nav" id="top-nav" aria-label="Page sections"></nav>

    <div id="sections"></div>

    <footer>
      Please text us if anything is unclear.
    </footer>
  </main>

  <script>
    const sections = [
      {
        title: "Feeding Maddie",
        nav: "Feeding",
        fileName: "video-577_singular_display.mov",
        video: "https://drive.google.com/file/d/1mzdAleg6ciLqN-uA75sortcMb4uoCvKt/view?usp=drivesdk",
        notes: [
          "Use the video as the main reference for where everything is and how to feed her.",
          "Make sure she has water after eating."
        ]
      },
      {
        title: "Maddie Water",
        nav: "Water",
        fileName: "video-591_singular_display.mov",
        video: "",
        notes: [
          "Use the video as the main reference for her water setup.",
          "Check and refill her water as needed."
        ]
      },
      {
        title: "Letting Maddie Outside",
        nav: "Outside",
        fileName: "video-597_singular_display.mov",
        video: "",
        notes: [
          "Use the video as the main reference for letting her out.",
          "Make sure the door is closed and locked again afterward."
        ]
      },
      {
        title: "Random Maddie Things",
        nav: "Random",
        fileName: "video-605_singular_display.mov",
        video: "",
        notes: [
          "Background noise:",
          "Use the video as the main reference for what to turn on or leave on for her."
        ]
      },
      {
        title: "House Stuff",
        nav: "House",
        fileName: "video-619_singular_display.mov",
        video: "",
        notes: [
          "Controlling TV:",
          "Use the video as the main reference for the remote and TV setup."
        ]
      },
      {
        title: "Extra Maddie / House Video 1",
        nav: "Extra 1",
        fileName: "video-637_singular_display.mov",
        video: "",
        notes: [
          "Use this section for the next video in the folder."
        ]
      },
      {
        title: "Extra Maddie / House Video 2",
        nav: "Extra 2",
        fileName: "video-653_singular_display.mov",
        video: "",
        notes: [
          "Use this section for the final video in the folder."
        ]
      }
    ];

    function slugify(text) {
      return text
        .toLowerCase()
        .replace(/&/g, "and")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getDriveFileId(input) {
      if (!input) return "";

      const value = String(input).trim();

      const filePathMatch = value.match(/\/file\/d\/([^/]+)/);
      if (filePathMatch && filePathMatch[1]) {
        return filePathMatch[1];
      }

      const queryIdMatch = value.match(/[?&]id=([^&]+)/);
      if (queryIdMatch && queryIdMatch[1]) {
        return queryIdMatch[1];
      }

      const plainIdMatch = value.match(/^[a-zA-Z0-9_-]{20,}$/);
      if (plainIdMatch) {
        return value;
      }

      return "";
    }

    function createVideoEmbed(videoInput, title, fileName) {
      const id = getDriveFileId(videoInput);

      if (!id) {
        return `
          <div class="empty-video">
            No Drive link added yet for <strong>${escapeHtml(fileName)}</strong>.
            Paste that file’s Google Drive link into this section’s <code>video</code> field.
          </div>
        `;
      }

      const previewUrl = `https://drive.google.com/file/d/${id}/preview`;
      const directUrl = `https://drive.google.com/file/d/${id}/view`;

      return `
        <div class="video-shell">
          <p class="video-label">${escapeHtml(title)} video</p>
          <div class="video">
            <iframe
              src="${previewUrl}"
              title="${escapeHtml(title)} video"
              allow="autoplay; fullscreen"
              allowfullscreen
              loading="lazy">
            </iframe>
          </div>
          <div class="button-row">
            <a class="button" href="${directUrl}" target="_blank" rel="noopener">Open video directly</a>
            <a class="button secondary" href="#top-nav">Back to top</a>
          </div>
        </div>
      `;
    }

    function renderNav() {
      const nav = document.getElementById("top-nav");

      nav.innerHTML = sections.map((section) => {
        const id = slugify(section.title);
        return `<a href="#${id}">${escapeHtml(section.nav || section.title)}</a>`;
      }).join("");
    }

    function renderSections() {
      const root = document.getElementById("sections");

      root.innerHTML = sections.map((section) => {
        const id = slugify(section.title);

        const notes = section.notes.map((note) => {
          return `<li>${escapeHtml(note)}</li>`;
        }).join("");

        return `
          <section class="card" id="${id}">
            <h2>${escapeHtml(section.title)}</h2>
            <p class="file-name">${escapeHtml(section.fileName)}</p>
            <ul>${notes}</ul>
            ${createVideoEmbed(section.video, section.title, section.fileName)}
          </section>
        `;
      }).join("");
    }

    renderNav();
    renderSections();
  </script>
</body>
</html>
